<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Tabela</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Formulário com Validação</h1>
        
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite o nome">
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite o email">
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="Digite o telefone">
        </div>
        
        <button onclick="adicionarLinha()">Adicionar à Tabela</button>
        <button onclick="validarTabela()" class="btn-validar">Validar Tabela</button>
        
        <div id="mensagem"></div>
        
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <!-- As linhas serão adicionadas aqui -->
            </tbody>
        </table>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
