<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Banana e Círculo Azul</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f1ea; 
            background-image: 
                radial-gradient(circle at 25px 25px, black 12px, transparent 13px),
                linear-gradient(0deg, transparent 21px, rgba(0, 200, 255, 0.4) 21px, rgba(255, 0, 150, 0.4) 29px, transparent 29px),
                linear-gradient(90deg, transparent 21px, rgba(0, 200, 255, 0.4) 21px, rgba(255, 0, 150, 0.4) 29px, transparent 29px);
            background-size: 50px 50px;
            display: flex;
            flex-direction: column;
        }

        /* --- FAIXAS --- */
        .faixa-topo {
            width: 100%; height: 60px;
            background: linear-gradient(to bottom, #00008B, aquamarine);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .faixa-lateral {
            width: 100px;
            background: linear-gradient(to right, #00008B, aquamarine);
            display: flex; flex-direction: row; justify-content: center; align-items: center;
            z-index: 5;
        }

        .texto-faixa { color: black; font-size: 11px; font-weight: bold; text-align: center; padding: 5px; text-transform: uppercase; }
        .texto-lateral { transform: rotate(-90deg); white-space: nowrap; }
        .linha-vermelha-h { width: 100%; height: 5px; background: red; }
        .linha-vermelha-v { width: 5px; height: 100%; background: red; }

        .area-principal { display: flex; flex-grow: 1; position: relative; }
        .conteudo-dinamico { flex-grow: 1; padding: 40px; position: relative; z-index: 2; }

        /* --- GRUPO CENTRAL (QUADRADO + CÍRCULO) --- */
        .grupo-central {
            position: absolute;
            top: 50%;
            left: 55%; /* Levemente para a direita para compensar a barra lateral */
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 30px; /* Espaço entre o quadrado e o círculo */
            z-index: 1;
        }

        .quadrado-laranja {
            width: 120px;
            height: 120px;
            background-color: orange;
            border: 4px solid white;
            box-shadow: 0 0 25px rgba(255, 165, 0, 0.6);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
        }

        .circulo-azul {
            width: 140px;
            height: 140px;
            background-color: #007bff;
            border-radius: 50%; /* Faz ser um círculo */
            border: 4px solid white;
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.6);
        }

        /* --- CONEXÕES DAS CÁPSULAS --- */
        .wrapper-conexoes { display: flex; flex-direction: column; align-items: flex-start; gap: 60px; }
        .capsula-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        .capsula {
            background-color: #00008B; color: white; padding: 12px 30px;
            border: 3px solid white; border-radius: 50px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        .capsula-container:not(:last-child)::after {
            content: "contato"; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); width: 6px; height: 60px;
            background-color: #2ecc71; color: #2ecc71; font-size: 13px;
            font-weight: bold; display: flex; align-items: center;
            padding-left: 70px; white-space: nowrap; text-shadow: 2px 2px 3px black;
        }

        /* --- CUBO PRETO NO CANTO --- */
        .cubo {
            width: 160px; height: 160px; background-color: black; color: white;
            border: 2px solid #444; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            position: fixed; bottom: 30px; right: 30px; font-weight: bold;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            z-index: 100;
        }
    </style>
</head>
<body>

    <header class="faixa-topo">
        <div class="texto-faixa">clique lá para mais informações</div>
        <div class="linha-vermelha-h"></div>
    </header>

    <div class="area-principal">
        <aside class="faixa-lateral">
            <div class="linha-vermelha-v"></div>
            <div class="texto-faixa texto-lateral">clique lá para mais informações</div>
        </aside>

        <main class="conteudo-dinamico">
            <div class="grupo-central">
                <div class="quadrado-laranja">banana</div>
                <div class="circulo-azul"></div>
            </div>

            <div class="wrapper-conexoes">
                <div class="capsula-container"><div class="capsula">clique</div></div>
                <div class="capsula-container"><div class="capsula">clique</div></div>
                <div class="capsula-container"><div class="capsula">clique</div></div>
            </div>
            
            <div class="cubo">insira o code</div>
        </main>
    </div>

</body>
</html>
